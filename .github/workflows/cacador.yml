name: Caçador de Narrativas

on:
  workflow_dispatch:

  schedule:
    # Alertas explosivos: de hora em hora
    - cron: "5 * * * *"

    # Radar completo: 08h Brasil = 11h UTC
    - cron: "15 11 * * *"

    # Radar completo: 20h Brasil = 23h UTC
    - cron: "15 23 * * *"

    # Resumo semanal: segunda-feira 08h Brasil = 11h UTC
    - cron: "25 11 * * 1"

    # Radar de sexta: sexta-feira 18h Brasil = 21h UTC
    - cron: "25 21 * * 5"

    # Tendência estrutural mensal: todo dia 1 às 08h Brasil = 11h UTC
    - cron: "35 11 1 * *"

jobs:
  cacador:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar alertas explosivos
        if: github.event.schedule == '5 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          WALLET_HUNTER_ADDRESSES: ${{ secrets.WALLET_HUNTER_ADDRESSES }}
          RUN_ONCE: "true"
          OUTPUT_MODE: "alerts"
          POLL_INTERVAL_SECONDS: "3600"
          TOP_N_TOKENS: "50"
          ALERT_THRESHOLD: "85"
          ALERT_COOLDOWN_MINUTES: "60"
        run: python -m collector.main

      - name: Rodar radar completo manhã
        if: github.event.schedule == '15 11 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          WALLET_HUNTER_ADDRESSES: ${{ secrets.WALLET_HUNTER_ADDRESSES }}
          RUN_ONCE: "true"
          OUTPUT_MODE: "full"
          POLL_INTERVAL_SECONDS: "3600"
          TOP_N_TOKENS: "50"
          ALERT_THRESHOLD: "80"
          ALERT_COOLDOWN_MINUTES: "60"
        run: python -m collector.main

      - name: Rodar radar completo noite
        if: github.event.schedule == '15 23 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          WALLET_HUNTER_ADDRESSES: ${{ secrets.WALLET_HUNTER_ADDRESSES }}
          RUN_ONCE: "true"
          OUTPUT_MODE: "full"
          POLL_INTERVAL_SECONDS: "3600"
          TOP_N_TOKENS: "50"
          ALERT_THRESHOLD: "80"
          ALERT_COOLDOWN_MINUTES: "60"
        run: python -m collector.main

      - name: Rodar resumo semanal
        if: github.event.schedule == '25 11 * * 1'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m collector.weekly_report

      - name: Rodar radar de sexta
        if: github.event.schedule == '25 21 * * 5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m collector.friday_report

      - name: Rodar tendência estrutural de 30 dias
        if: github.event.schedule == '35 11 1 * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m collector.monthly_trend
