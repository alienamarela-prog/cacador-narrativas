name: Caçador de Narrativas

on:
  workflow_dispatch:

  schedule:
    # Radar completo: 08h e 20h Brasil = 11h e 23h UTC
    - cron: "0 11,23 * * *"

    # Checagem silenciosa de alertas explosivos: a cada 30 minutos
    - cron: "*/30 * * * *"

    # Resumo semanal: segunda-feira 08h Brasil = 11h UTC
    - cron: "0 11 * * 1"

    # Radar de sexta: sexta-feira 18h Brasil = 21h UTC
    - cron: "0 21 * * 5"

    # Tendência estrutural mensal: todo dia 1 às 08h Brasil = 11h UTC
    - cron: "0 11 1 * *"

jobs:
  cacador:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar radar completo
        if: github.event.schedule == '0 11,23 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ONCE: "true"
          OUTPUT_MODE: "full"
          POLL_INTERVAL_SECONDS: "3600"
          TOP_N_TOKENS: "50"
          ALERT_THRESHOLD: "80"
          ALERT_COOLDOWN_MINUTES: "60"
        run: python -m collector.main

      - name: Checar alertas explosivos
        if: github.event.schedule == '*/30 * * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ONCE: "true"
          OUTPUT_MODE: "alerts"
          POLL_INTERVAL_SECONDS: "3600"
          TOP_N_TOKENS: "50"
          ALERT_THRESHOLD: "85"
          ALERT_COOLDOWN_MINUTES: "60"
        run: python -m collector.main

      - name: Rodar resumo semanal
        if: github.event.schedule == '0 11 * * 1'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m collector.weekly_report

      - name: Rodar radar de sexta
        if: github.event.schedule == '0 21 * * 5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m collector.friday_report

      - name: Rodar tendência estrutural de 30 dias
        if: github.event.schedule == '0 11 1 * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m collector.monthly_trend
